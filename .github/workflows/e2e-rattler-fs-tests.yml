on:
  push:
    branches: [main, rattler-fs]
  pull_request:
    paths:
      - crates/rattler_fs/**
      - crates/rattler-bin/**
      - scripts/e2e/rattler-fs-mount.nu
      - test-data/rattler-fs/**
      - .github/workflows/e2e-rattler-fs-tests.yml

name: E2E rattler-fs Mount Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_LOG: info
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

# Three rattler-build jobs (one per OS) so each platform's e2e tests can
# start as soon as its own rattler binary is ready, rather than waiting for
# the slowest platform (Windows) before any e2e leg can begin. GitHub
# Actions doesn't support per-matrix-leg `needs:` — `needs:` always blocks
# until every leg of the upstream matrix completes.

jobs:
  # ----- rattler binary builds (one job per OS) -----

  build-rattler-linux:
    name: build-rattler (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      # Build inside the rattler pixi env so we get conda-forge's gcc
      # toolchain, which targets manylinux_2_17 (glibc 2.17) and produces a
      # portable binary that works on RHEL/CentOS/AlmaLinux 7+, not just on
      # the Ubuntu runner's glibc 2.39.
      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          environments: default
      - run: sudo apt-get update && sudo apt-get install -y libfuse3-dev
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          # The pixi env's activate_linux.sh sets CARGO_TARGET_DIR=.pixi/target.
          workspaces: . -> .pixi/target
          key: rattler-linux-pixi
          shared-key: rattler-linux-pixi
      # -static-libgcc embeds libgcc_s so the binary doesn't depend on the
      # builder's GCC runtime symbol versions (e.g. GCC_12.0.0), which aren't
      # present on older targets like AlmaLinux 9 / lxplus.
      - run: pixi run -e default cargo build --release -p rattler-bin --features mount
        env:
          RUSTFLAGS: "-C link-arg=-static-libgcc"
      - name: Stage rattler
        run: |
          mkdir -p bin-staging
          cp .pixi/target/release/rattler bin-staging/
          chmod +x bin-staging/rattler
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rattler-ubuntu-latest
          path: bin-staging/
          retention-days: 1
          if-no-files-found: error

  build-rattler-macos:
    name: build-rattler (macos-14)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      # macOS uses rustup directly, NOT the pixi env: the env leaks dynamic
      # deps (e.g. liblzma) into the binary, which then fails at startup
      # off the build machine with `Library not loaded`.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-04-26
        with:
          toolchain: "1.93.1"
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: . -> target
          key: rattler-macos-14
          shared-key: rattler-macos-14
      - run: cargo build --release -p rattler-bin --features mount
      - name: Stage rattler
        run: |
          mkdir -p bin-staging
          cp target/release/rattler bin-staging/
          chmod +x bin-staging/rattler
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rattler-macos-14
          path: bin-staging/
          retention-days: 1
          if-no-files-found: error

  build-rattler-windows:
    name: build-rattler (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-04-26
        with:
          toolchain: "1.93.1"
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: . -> target
          key: rattler-windows-latest
          shared-key: rattler-windows-latest
      - run: cargo build --release -p rattler-bin --features mount
      - name: Stage rattler
        shell: bash
        run: |
          mkdir -p bin-staging
          cp target/release/rattler.exe bin-staging/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rattler-windows-latest
          path: bin-staging/
          retention-days: 1
          if-no-files-found: error

  # ----- pixi-fork build (matrix; not on the e2e critical path) -----

  build-pixi-fork:
    name: build-pixi-fork (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-04-26
        with:
          toolchain: "1.93.1"
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: chrisburr/pixi
          ref: feat/rattler-fs
          path: pixi-src
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: pixi-src -> target
          key: pixi-${{ matrix.os }}
          shared-key: pixi-${{ matrix.os }}
      - name: Repoint pixi fork patch paths
        shell: bash
        run: |
          python - <<'PY'
          import re, pathlib
          p = pathlib.Path('pixi-src/Cargo.toml')
          s = p.read_text()
          s = re.sub(
              r'path\s*=\s*"[^"]*[/\\]rattler[/\\]crates[/\\]([A-Za-z0-9_]+)"',
              r'path = "../crates/\1"',
              s,
          )
          p.write_text(s)
          PY
          echo "--- Patched [patch.crates-io] paths:"
          grep -E 'path = "\.\./crates/' pixi-src/Cargo.toml || true
      - run: cargo build --release --manifest-path pixi-src/Cargo.toml -p pixi

  # ----- e2e-mount jobs (one per OS, gated only on its own rattler build) -----

  e2e-mount-linux:
    name: ubuntu-latest
    runs-on: ubuntu-latest
    needs: build-rattler-linux
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: rattler-ubuntu-latest
          path: ${{ runner.temp }}/bins
      - run: |
          chmod +x "${RUNNER_TEMP}/bins/"*
          echo "${RUNNER_TEMP}/bins" >> "$GITHUB_PATH"
      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          environments: rattler-fs-test
      - name: Verify binaries
        run: |
          which pixi
          pixi --version
          which rattler
          rattler --help | head -5
      - run: sudo apt-get update && sudo apt-get install -y fuse3 nfs-common
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.rattler/cache/pkgs
          key: rattler-fs-pkgs-Linux-${{ hashFiles('test-data/rattler-fs/pixi.lock') }}
          restore-keys: |
            rattler-fs-pkgs-Linux-
      - name: FUSE read-only
        timeout-minutes: 15
        env: {TRANSPORT: fuse, OVERLAY: "false"}
        run: pixi run -e rattler-fs-test e2e-rattler-fs
      - name: NFS read-only
        timeout-minutes: 15
        env: {TRANSPORT: nfs, OVERLAY: "false"}
        run: pixi run -e rattler-fs-test e2e-rattler-fs
      - name: FUSE overlay
        timeout-minutes: 15
        env: {TRANSPORT: fuse, OVERLAY: "true"}
        run: pixi run -e rattler-fs-test e2e-rattler-fs
      - name: NFS overlay
        timeout-minutes: 15
        env: {TRANSPORT: nfs, OVERLAY: "true"}
        run: pixi run -e rattler-fs-test e2e-rattler-fs
      - name: Cleanup mounts
        if: always()
        run: |
          for mnt in "${RUNNER_TEMP:-/tmp}"/rattler-fs-*; do
            sudo umount -f "$mnt" 2>/dev/null || true
            fusermount3 -u "$mnt" 2>/dev/null || true
          done
          pkill -9 -f 'rattler mount' 2>/dev/null || true

  e2e-mount-macos:
    name: macos-14
    runs-on: macos-14
    needs: build-rattler-macos
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: rattler-macos-14
          path: ${{ runner.temp }}/bins
      - run: |
          chmod +x "${RUNNER_TEMP}/bins/"*
          echo "${RUNNER_TEMP}/bins" >> "$GITHUB_PATH"
      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          environments: rattler-fs-test
      - name: Verify binaries
        run: |
          which pixi
          pixi --version
          which rattler
          rattler --help | head -5
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.rattler/cache/pkgs
          key: rattler-fs-pkgs-macOS-${{ hashFiles('test-data/rattler-fs/pixi.lock') }}
          restore-keys: |
            rattler-fs-pkgs-macOS-
      - name: NFS read-only
        timeout-minutes: 15
        env: {TRANSPORT: nfs, OVERLAY: "false"}
        run: pixi run -e rattler-fs-test e2e-rattler-fs
      - name: NFS overlay
        timeout-minutes: 15
        env: {TRANSPORT: nfs, OVERLAY: "true"}
        run: pixi run -e rattler-fs-test e2e-rattler-fs
      - name: Cleanup mounts
        if: always()
        run: |
          for mnt in "${RUNNER_TEMP:-/tmp}"/rattler-fs-*; do
            sudo umount -f "$mnt" 2>/dev/null || true
          done
          pkill -9 -f 'rattler mount' 2>/dev/null || true

  e2e-mount-windows:
    name: windows-latest
    runs-on: windows-latest
    needs: build-rattler-windows
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: rattler-windows-latest
          path: ${{ runner.temp }}/bins
      - shell: bash
        run: echo "${RUNNER_TEMP}/bins" >> "$GITHUB_PATH"
      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          environments: rattler-fs-test
      - name: Verify binaries
        shell: bash
        run: |
          which pixi
          pixi --version
          which rattler
          rattler --help | head -5
      - name: Enable ProjFS
        shell: powershell
        run: Enable-WindowsOptionalFeature -Online -FeatureName Client-ProjFS -NoRestart
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.rattler/cache/pkgs
          key: rattler-fs-pkgs-Windows-${{ hashFiles('test-data/rattler-fs/pixi.lock') }}
          restore-keys: |
            rattler-fs-pkgs-Windows-
      - name: ProjFS overlay
        timeout-minutes: 15
        env: {TRANSPORT: projfs, OVERLAY: "true"}
        run: pixi run -e rattler-fs-test e2e-rattler-fs
      - name: Cleanup mounts
        if: always()
        shell: bash
        run: |
          taskkill /F /IM rattler.exe 2>/dev/null || true

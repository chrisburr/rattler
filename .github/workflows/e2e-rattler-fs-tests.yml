on:
  push:
    branches: [main, rattler-fs]
  pull_request:
    paths:
      - crates/rattler_fs/**
      - crates/rattler-bin/**
      - scripts/e2e/rattler-fs-mount.nu
      - test-data/rattler-fs/**
      - .github/workflows/e2e-rattler-fs-tests.yml

name: E2E rattler-fs Mount Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_LOG: info
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: build-binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - name: Checkout rattler
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          environments: default

      - name: Install FUSE dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev

      - name: Cache rattler target
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: . -> target
          key: rattler-${{ matrix.os }}
          shared-key: rattler-${{ matrix.os }}

      - name: Build rattler with mount feature
        run: pixi run -e default cargo build --release -p rattler-bin --features mount

      - name: Checkout pixi fork
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: chrisburr/pixi
          ref: feat/rattler-fs
          path: pixi-src

      - name: Cache pixi target
        uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: pixi-src -> target
          key: pixi-${{ matrix.os }}
          shared-key: pixi-${{ matrix.os }}

      # The fork's [patch.crates-io] section pins every rattler crate to an
      # absolute path on the maintainer's machine
      # (e.g. /Users/cburr/Development/rattler/crates/<name>). Rewrite every
      # such path to a relative path into the rattler checkout that sits next
      # to pixi-src.
      - name: Repoint pixi fork patch paths
        shell: bash
        run: |
          python - <<'PY'
          import re, pathlib
          p = pathlib.Path('pixi-src/Cargo.toml')
          s = p.read_text()
          s = re.sub(
              r'path\s*=\s*"[^"]*[/\\]rattler[/\\]crates[/\\]([A-Za-z0-9_]+)"',
              r'path = "../crates/\1"',
              s,
          )
          p.write_text(s)
          PY
          echo "--- Patched [patch.crates-io] paths:"
          grep -E 'path = "\.\./crates/' pixi-src/Cargo.toml || true

      - name: Build pixi from fork
        run: pixi run -e default cargo build --release --manifest-path pixi-src/Cargo.toml -p pixi

      - name: Stage binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          # On Linux, scripts/activate_linux.sh (run by the pixi default env's
          # activation) sets CARGO_TARGET_DIR=.pixi/target, so both the rattler
          # build and the pixi-src build land their outputs there — not in
          # ./target or pixi-src/target. Honor an explicit env var, then fall
          # back through the candidate locations.
          find_bin() {
            local name="$1"
            for d in "${CARGO_TARGET_DIR}" "$2" .pixi/target target; do
              if [ -n "$d" ] && [ -x "$d/release/$name" ]; then
                echo "$d/release/$name"; return 0
              fi
            done
            echo "could not find $name binary" >&2; return 1
          }
          mkdir -p bin-staging
          cp "$(find_bin rattler target)" bin-staging/
          cp "$(find_bin pixi pixi-src/target)" bin-staging/
          chmod +x bin-staging/rattler bin-staging/pixi

      - name: Stage binaries (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p bin-staging
          cp target/release/rattler.exe bin-staging/
          cp pixi-src/target/release/pixi.exe bin-staging/

      - name: Upload binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bins-${{ matrix.os }}
          path: bin-staging/
          retention-days: 1
          if-no-files-found: error

  e2e-mount:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: build-binaries
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - name: Checkout source code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Download prebuilt binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: bins-${{ matrix.os }}
          path: ${{ runner.temp }}/bins

      - name: Put binaries on PATH (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x "${RUNNER_TEMP}/bins/"*
          echo "${RUNNER_TEMP}/bins" >> "$GITHUB_PATH"

      - name: Put binaries on PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "${RUNNER_TEMP}/bins" >> "$GITHUB_PATH"

      - name: Verify binaries
        shell: bash
        run: |
          which pixi
          pixi --version
          which rattler
          rattler --help | head -5

      - name: Install FUSE (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fuse3

      - name: Install NFS client (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y nfs-common

      - name: Enable ProjFS (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: Enable-WindowsOptionalFeature -Online -FeatureName Client-ProjFS -NoRestart

      - name: Cache conda packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.rattler/cache/pkgs
          key: rattler-fs-pkgs-${{ runner.os }}-${{ hashFiles('test-data/rattler-fs/pixi.lock') }}
          restore-keys: |
            rattler-fs-pkgs-${{ runner.os }}-

      - name: Install rattler-fs-test pixi env
        run: pixi install -e rattler-fs-test

      # Read-only tests (includes symlink, network failure, and shutdown tests)
      - name: FUSE read-only
        if: runner.os == 'Linux'
        timeout-minutes: 15
        env: {TRANSPORT: fuse, OVERLAY: "false"}
        run: pixi run -e rattler-fs-test e2e-rattler-fs

      - name: NFS read-only
        if: runner.os != 'Windows'
        timeout-minutes: 15
        env: {TRANSPORT: nfs, OVERLAY: "false"}
        run: pixi run -e rattler-fs-test e2e-rattler-fs

      # Overlay tests (longer timeout: includes persistence, mismatch, shutdown, and stale mount tests)
      - name: FUSE overlay
        if: runner.os == 'Linux'
        timeout-minutes: 15
        env: {TRANSPORT: fuse, OVERLAY: "true"}
        run: pixi run -e rattler-fs-test e2e-rattler-fs

      - name: NFS overlay
        if: runner.os != 'Windows'
        timeout-minutes: 15
        env: {TRANSPORT: nfs, OVERLAY: "true"}
        run: pixi run -e rattler-fs-test e2e-rattler-fs

      - name: ProjFS overlay
        if: runner.os == 'Windows'
        timeout-minutes: 15
        env: {TRANSPORT: projfs, OVERLAY: "true"}
        run: pixi run -e rattler-fs-test e2e-rattler-fs

      - name: Cleanup mounts
        if: always()
        shell: bash
        run: |
          for mnt in "${RUNNER_TEMP:-/tmp}"/rattler-fs-*; do
            sudo umount -f "$mnt" 2>/dev/null || true
            fusermount3 -u "$mnt" 2>/dev/null || true
          done
          pkill -9 -f 'rattler mount' 2>/dev/null || true
          taskkill /F /IM rattler.exe 2>/dev/null || true
